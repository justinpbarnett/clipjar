<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,600;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#060402;
  --border:#1E1005;
  --amber:#C47830;
  --gold:#E8A840;
  --cream:#EDD8B0;
  --muted:#503818;
  --dim:#180C04;
}

html,body{width:440px;height:280px;overflow:hidden;background:var(--bg)}
body{display:flex;align-items:center;justify-content:space-between;padding:0 44px 0 48px;position:relative}

/* Left amber bar */
body::after{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--amber);opacity:0.75;
}

/* Dot grid */
body::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(196,120,48,0.08) 1px,transparent 1px);
  background-size:24px 24px;
  pointer-events:none;
}

.grain{
  position:absolute;inset:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:0.55;
}

/* Amber glow right side */
.glow{
  position:absolute;right:40px;top:50%;transform:translateY(-50%);
  width:220px;height:260px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(196,120,48,0.13) 0%,transparent 65%);
  pointer-events:none;
}

.content{position:relative;z-index:1;flex:1}

.logo-row{display:flex;align-items:center;gap:8px;margin-bottom:18px}
.logo-row svg{color:var(--amber)}
.logo-name{
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
  color:var(--amber);letter-spacing:0.28em;text-transform:uppercase;
}

.headline{
  font-family:'Spectral',Georgia,serif;
  font-size:40px;font-weight:300;line-height:1.08;
  color:var(--cream);letter-spacing:-0.02em;margin-bottom:16px;
}
.headline em{font-style:italic;font-weight:600;color:var(--gold)}

.tagline{
  font-family:'Space Mono',monospace;
  font-size:9px;font-weight:400;color:var(--muted);
  letter-spacing:0.12em;text-transform:uppercase;line-height:1.8;
}

/* Large decorative jar */
.jar-deco{
  position:relative;z-index:1;flex-shrink:0;
  color:var(--amber);opacity:0.55;margin-left:24px;
}
</style>
</head>
<body>
  <div class="grain"></div>
  <div class="glow"></div>

  <div class="content">
    <div class="logo-row">
      <svg width="13" height="16" viewBox="0 0 13 17" fill="none">
        <rect x="2" y="0.5" width="9" height="2.5" rx="0.8" fill="currentColor" opacity="0.85"/>
        <rect x="3.5" y="3" width="6" height="1.5" fill="currentColor" opacity="0.55"/>
        <path d="M1.5 4.5L1 14Q1 15.5 2.5 15.5H10.5Q12 15.5 12 14L11.5 4.5Z" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-opacity="0.65" stroke-width="0.9"/>
        <line x1="3.5" y1="6" x2="3" y2="13.5" stroke="currentColor" stroke-width="0.9" opacity="0.25" stroke-linecap="round"/>
      </svg>
      <span class="logo-name">Clipjar</span>
    </div>
    <div class="headline">Clipboard<br><em>history.</em></div>
    <div class="tagline">Free &middot; Private &middot; Keyboard-first</div>
  </div>

  <svg class="jar-deco" width="72" height="90" viewBox="0 0 52 68" fill="none">
    <rect x="8" y="2" width="36" height="10" rx="2.5" fill="currentColor" opacity="0.9"/>
    <rect x="14" y="12" width="24" height="6" fill="currentColor" opacity="0.55"/>
    <path d="M5 18L2 56Q2 63 9 63H43Q50 63 50 56L47 18Z"
      fill="currentColor" fill-opacity="0.1"
      stroke="currentColor" stroke-opacity="0.5" stroke-width="1.5"/>
    <line x1="14" y1="22" x2="11.5" y2="58" stroke="currentColor" stroke-width="2.5" opacity="0.2" stroke-linecap="round"/>
    <rect x="8" y="30" width="36" height="18" rx="1" fill="currentColor" fill-opacity="0.06" stroke="currentColor" stroke-opacity="0.2" stroke-width="0.8"/>
    <line x1="12" y1="36" x2="40" y2="36" stroke="currentColor" stroke-width="0.8" opacity="0.14"/>
    <line x1="12" y1="40" x2="35" y2="40" stroke="currentColor" stroke-width="0.8" opacity="0.14"/>
    <line x1="12" y1="44" x2="30" y2="44" stroke="currentColor" stroke-width="0.8" opacity="0.1"/>
  </svg>
</body>
</html>
